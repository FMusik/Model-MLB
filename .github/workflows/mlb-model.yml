name: MLB Model

on:
  schedule:
    - cron: '0 13 * * *'   # 9am ET
    - cron: '0 16 * * *'   # 12pm ET
    - cron: '0 21 * * *'   # 5pm ET
  workflow_dispatch:

jobs:
  run-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests pandas openpyxl selenium

      - name: Write credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Fetch BallparkPal data
        run: python fetch_ballparkpal.py

      - name: Run MLB model
        run: python mlb_model.py
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
