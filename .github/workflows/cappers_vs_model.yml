          def print_summary(ws_unified):
              rows = ws_unified.get_all_values()[1:]

              def record(col_idx):
                  settled = [r for r in rows if len(r) > col_idx and r[col_idx] not in ("PENDING","","NO BET")]
                  wins    = sum(1 for r in settled if r[col_idx] == "WIN")
                  losses  = sum(1 for r in settled if r[col_idx] == "LOSS")
                  total   = wins + losses
                  pct     = f"{wins/total*100:.1f}%" if total > 0 else "N/A"
                  return wins, losses, pct

              # Rows where both Faro + Atropa picked and results are settled
              all_agree = [r for r in rows
