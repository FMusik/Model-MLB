name: Cappers vs Model

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date of picks (YYYY-MM-DD)"
        required: true
        default: ""
      faro_json:
        description: "Faro picks JSON (paste from Claude) — leave [] to skip"
        required: false
        default: "[]"
      atropa_json:
        description: "Atropa picks JSON (paste from Claude) — leave [] to skip"
        required: false
        default: "[]"
      backfill:
        description: "Backfill Our Pick + Conf% for ALL rows from Tracker? (yes/no)"
        required: false
        default: "no"
      migrate:
        description: "Migrate existing Faro + Atropa tabs into unified tab? (yes/no)"
        required: false
        default: "no"
      rebuild:
        description: "Full rebuild — migrate + all Atropa dates + backfill + W/L (yes/no)"
        required: false
        default: "no"

jobs:
  cappers-vs-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Write credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run cappers logger
        env:
          RUN_DATE:    ${{ github.event.inputs.date }}
          FARO_JSON:   ${{ github.event.inputs.faro_json }}
          ATROPA_JSON: ${{ github.event.inputs.atropa_json }}
          MIGRATE:     ${{ github.event.inputs.migrate }}
          BACKFILL:    ${{ github.event.inputs.backfill }}
          REBUILD:     ${{ github.event.inputs.rebuild }}
        run: |
          python - <<'EOF'
          import os, json, sys, re, datetime, gspread
          from google.oauth2.service_account import Credentials

          # ── CONFIG ─────────────────────────────────────────────
          SHEET_URL   = "https://docs.google.com/spreadsheets/d/11mgGrwt8ZTNSXlMXk3mTctUOLoU7_4Y8pfiQ2RHYVGc/edit"
          UNIFIED_TAB = "📊 Cappers vs Model"
          FARO_TAB    = "🏟️ Faro vs Model"
          ATROPA_TAB  = "📸 Atropa vs Model"
          TRACKER_TAB = "📊 Tracker"

          HEADERS = [
              "Date", "Game", "Type",
              "Faro Pick", "Faro Conf%",
              "Atropa Pick", "Atropa Book", "Atropa Proj",
              "Our Pick", "Conf%",
              "Faro W/L", "Atropa W/L", "Our W/L",
          ]

          # Column indices (0-based)
          COL_DATE       = 0
          COL_GAME       = 1
          COL_TYPE       = 2
          COL_FARO_PICK  = 3
          COL_FARO_CONF  = 4
          COL_ATR_PICK   = 5
          COL_ATR_BOOK   = 6
          COL_ATR_PROJ   = 7
          COL_OUR_PICK   = 8
          COL_OUR_CONF   = 9
          COL_FARO_WL    = 10
          COL_ATR_WL     = 11
          COL_OUR_WL     = 12

          # ── TEAM NAME MAPS ────────────────────────────────────
          # Abbrev → Full name (covers Atropa abbreviations)
          ABBREV_TO_FULL = {
              "ARI": "Arizona Diamondbacks",
              "ATL": "Atlanta Braves",
              "BAL": "Baltimore Orioles",
              "BOS": "Boston Red Sox",
              "CHC": "Chicago Cubs",
              "CWS": "Chicago White Sox",
              "CIN": "Cincinnati Reds",
              "CLE": "Cleveland Guardians",
              "COL": "Colorado Rockies",
              "DET": "Detroit Tigers",
              "HOU": "Houston Astros",
              "KC":  "Kansas City Royals",
              "LAA": "Los Angeles Angels",
              "LAD": "Los Angeles Dodgers",
              "MIA": "Miami Marlins",
              "MIL": "Milwaukee Brewers",
              "MIN": "Minnesota Twins",
              "NYM": "New York Mets",
              "NYY": "New York Yankees",
              "OAK": "Athletics",
              "ATH": "Athletics",
              "PHI": "Philadelphia Phillies",
              "PIT": "Pittsburgh Pirates",
              "SD":  "San Diego Padres",
              "SDP": "San Diego Padres",
              "SEA": "Seattle Mariners",
              "SF":  "San Francisco Giants",
              "STL": "St. Louis Cardinals",
              "TB":  "Tampa Bay Rays",
              "TEX": "Texas Rangers",
              "TOR": "Toronto Blue Jays",
              "WSN": "Washington Nationals",
              "WSH": "Washington Nationals",
              "KCR": "Kansas City Royals",
              "TBR": "Tampa Bay Rays",
              "SFG": "San Francisco Giants",
          }

          def expand_abbrev(abbrev):
              """CWS → Chicago White Sox, CWS ML → Chicago White Sox"""
              clean = abbrev.upper().replace(" ML", "").strip()
              return ABBREV_TO_FULL.get(clean, abbrev)

          def expand_matchup(matchup):
              """CWS@SDP → Chicago White Sox @ San Diego Padres"""
              parts = re.split(r"[@]", matchup.upper())
              if len(parts) == 2:
                  away = ABBREV_TO_FULL.get(parts[0].strip(), parts[0].strip())
                  home = ABBREV_TO_FULL.get(parts[1].strip(), parts[1].strip())
                  return f"{away} @ {home}"
              return matchup

          # Reverse map: full name → abbrev for normalization
          FULL_TO_ABBREV = {v.upper(): k for k, v in ABBREV_TO_FULL.items()}
          FULL_TO_ABBREV["SAN DIEGO PADRES"]    = "SDP"
          FULL_TO_ABBREV["WASHINGTON NATIONALS"] = "WSN"
          FULL_TO_ABBREV["ATHLETICS"]             = "OAK"
          FULL_TO_ABBREV["OAKLAND ATHLETICS"]     = "OAK"
          FULL_TO_ABBREV["TAMPA BAY RAYS"]        = "TBR"
          FULL_TO_ABBREV["KANSAS CITY ROYALS"]    = "KCR"
          FULL_TO_ABBREV["SAN FRANCISCO GIANTS"]  = "SFG"
          FULL_TO_ABBREV["CHICAGO WHITE SOX"]     = "CWS"
          FULL_TO_ABBREV["CHICAGO CUBS"]          = "CHC"
          FULL_TO_ABBREV["NEW YORK YANKEES"]      = "NYY"
          FULL_TO_ABBREV["NEW YORK METS"]         = "NYM"
          FULL_TO_ABBREV["LOS ANGELES DODGERS"]   = "LAD"
          FULL_TO_ABBREV["LOS ANGELES ANGELS"]    = "LAA"
          FULL_TO_ABBREV["BOSTON RED SOX"]        = "BOS"
          FULL_TO_ABBREV["TORONTO BLUE JAYS"]     = "TOR"
          FULL_TO_ABBREV["MINNESOTA TWINS"]       = "MIN"
          FULL_TO_ABBREV["CLEVELAND GUARDIANS"]   = "CLE"
          FULL_TO_ABBREV["DETROIT TIGERS"]        = "DET"
          FULL_TO_ABBREV["HOUSTON ASTROS"]        = "HOU"
          FULL_TO_ABBREV["SEATTLE MARINERS"]      = "SEA"
          FULL_TO_ABBREV["TEXAS RANGERS"]         = "TEX"
          FULL_TO_ABBREV["BALTIMORE ORIOLES"]     = "BAL"
          FULL_TO_ABBREV["MIAMI MARLINS"]         = "MIA"
          FULL_TO_ABBREV["PHILADELPHIA PHILLIES"] = "PHI"
          FULL_TO_ABBREV["ATLANTA BRAVES"]        = "ATL"
          FULL_TO_ABBREV["PITTSBURGH PIRATES"]    = "PIT"
          FULL_TO_ABBREV["ST. LOUIS CARDINALS"]   = "STL"
          FULL_TO_ABBREV["MILWAUKEE BREWERS"]     = "MIL"
          FULL_TO_ABBREV["CINCINNATI REDS"]       = "CIN"
          FULL_TO_ABBREV["COLORADO ROCKIES"]      = "COL"
          FULL_TO_ABBREV["ARIZONA DIAMONDBACKS"]  = "ARI"

          def normalize_game(game_str):
              """Normalize to ABBREV@ABBREV for reliable dedup matching."""
              normalized = game_str.upper().replace(" @ ", "@").replace(" VS ", "@").strip()
              parts = normalized.split("@")
              if len(parts) == 2:
                  away = FULL_TO_ABBREV.get(parts[0].strip(), parts[0].strip())
                  home = FULL_TO_ABBREV.get(parts[1].strip(), parts[1].strip())
                  return f"{away}@{home}"
              return normalized

          # ── SHEETS AUTH ───────────────────────────────────────
          def get_sheet():
              scopes = [
                  "https://spreadsheets.google.com/feeds",
                  "https://www.googleapis.com/auth/drive",
              ]
              creds = Credentials.from_service_account_file("credentials.json", scopes=scopes)
              gc    = gspread.authorize(creds)
              return gc.open_by_url(SHEET_URL)

          def get_or_create_tab(sheet):
              try:
                  ws = sheet.worksheet(UNIFIED_TAB)
                  print(f"📋 Found tab: {UNIFIED_TAB}")
                  # Expand columns if needed for summary block in cols P-S
                  if ws.col_count < 20:
                      ws.add_cols(20 - ws.col_count)
                      print(f"   📐 Expanded tab to 20 columns")
              except gspread.WorksheetNotFound:
                  ws = sheet.add_worksheet(title=UNIFIED_TAB, rows=1000, cols=20)
                  ws.append_row(HEADERS)
                  print(f"✅ Created tab: {UNIFIED_TAB}")
              return ws

          def get_existing_keys(ws):
              rows = ws.get_all_values()
              keys = set()
              for row in rows[1:]:
                  if len(row) >= 7:
                      keys.add((row[COL_DATE], normalize_game(row[COL_GAME]), row[COL_TYPE].upper()))
              return keys

          # ── RESOLVE W/L ───────────────────────────────────────
          def resolve_ml(pick, away_score, home_score, game_str):
              try:
                  away_score, home_score = float(away_score), float(home_score)
              except (ValueError, TypeError):
                  return "PENDING"
              # Normalize game and pick to abbrevs for reliable matching
              norm_game = normalize_game(game_str)
              parts     = norm_game.split("@")
              if len(parts) != 2:
                  print(f"   ⚠️  Can't parse game: '{game_str}'")
                  return "PENDING"
              away_abbrev = parts[0].strip()
              home_abbrev = parts[1].strip()
              # Normalize pick to abbrev too
              pick_clean  = pick.upper().replace(" ML","").strip()
              pick_abbrev = FULL_TO_ABBREV.get(pick_clean, pick_clean)
              if pick_abbrev == away_abbrev:
                  won = away_score > home_score
              elif pick_abbrev == home_abbrev:
                  won = home_score > away_score
              else:
                  print(f"   ⚠️  Can't match '{pick}' ({pick_abbrev}) to '{away_abbrev}@{home_abbrev}'")
                  return "PENDING"
              if away_score == home_score:
                  return "PUSH"
              return "WIN" if won else "LOSS"

          def resolve_total(pick, away_score, home_score):
              try:
                  away_score, home_score = float(away_score), float(home_score)
              except (ValueError, TypeError):
                  return "PENDING"
              actual = away_score + home_score
              m = re.match(r"([OU])(\d+\.?\d*)", pick.upper().replace("OVER","O").replace("UNDER","U"))
              if not m:
                  return "PENDING"
              direction, line = m.group(1), float(m.group(2))
              if actual == line:
                  return "PUSH"
              return "WIN" if (direction=="O" and actual>line) or (direction=="U" and actual<line) else "LOSS"

          # ── MIGRATE EXISTING TABS ─────────────────────────────
          def migrate(sheet, ws_unified):
              print("\n🔄 Migrating existing Faro + Atropa data...")
              existing_keys = get_existing_keys(ws_unified)
              migrated = 0

              # Migrate Faro tab
              try:
                  ws_faro = sheet.worksheet(FARO_TAB)
                  faro_rows = ws_faro.get_all_values()[1:]
                  for row in faro_rows:
                      if len(row) < 4:
                          continue
                      date_str  = row[0].strip()
                      game      = row[1].strip()
                      faro_pick = row[2].strip()
                      faro_conf = row[3].strip()
                      our_pick  = row[4].strip() if len(row) > 4 else ""
                      # our_proj removed — using Conf% instead
                      faro_wl   = row[7].strip() if len(row) > 7 else "PENDING"
                      our_wl    = row[8].strip() if len(row) > 8 else "PENDING"

                      key = (date_str, normalize_game(game), "ML")
                      if key in existing_keys:
                          continue

                      new_row = [""] * len(HEADERS)
                      new_row[COL_DATE]      = date_str
                      new_row[COL_GAME]      = game
                      new_row[COL_TYPE]      = "ML"
                      new_row[COL_FARO_PICK] = faro_pick
                      new_row[COL_FARO_CONF] = faro_conf
                      new_row[COL_OUR_PICK]  = our_pick
                      new_row[COL_OUR_CONF]  = ""
                      new_row[COL_FARO_WL]   = faro_wl
                      new_row[COL_ATR_WL]    = ""
                      new_row[COL_OUR_WL]    = our_wl
                      ws_unified.append_row(new_row)
                      existing_keys.add(key)
                      migrated += 1
                  print(f"   ✅ Faro: {migrated} rows migrated")
              except gspread.WorksheetNotFound:
                  print("   ⚠️  Faro tab not found — skipping")

              # Migrate Atropa tab
              atr_migrated = 0
              try:
                  ws_atropa = sheet.worksheet(ATROPA_TAB)
                  atropa_rows = ws_atropa.get_all_values()[1:]
                  for row in atropa_rows:
                      if len(row) < 5:
                          continue
                      date_str  = row[0].strip()
                      matchup   = row[1].strip()
                      pick_type = row[3].strip()
                      atr_pick  = row[4].strip()
                      atr_book  = row[5].strip() if len(row) > 5 else ""
                      atr_proj  = row[6].strip() if len(row) > 6 else ""
                      atr_wl    = row[10].strip() if len(row) > 10 else "PENDING"

                      # Expand abbreviations
                      game_full    = expand_matchup(matchup)
                      atr_pick_full = expand_abbrev(atr_pick)

                      key = (date_str, normalize_game(game_full), pick_type.upper())
                      if key in existing_keys:
                          continue

                      new_row = [""] * len(HEADERS)
                      new_row[COL_DATE]     = date_str
                      new_row[COL_GAME]     = game_full
                      new_row[COL_TYPE]     = pick_type
                      new_row[COL_ATR_PICK] = atr_pick_full
                      new_row[COL_ATR_BOOK] = atr_book
                      new_row[COL_ATR_PROJ] = atr_proj
                      new_row[COL_FARO_WL]  = ""
                      new_row[COL_ATR_WL]   = atr_wl
                      new_row[COL_OUR_WL]   = ""
                      ws_unified.append_row(new_row)
                      existing_keys.add(key)
                      atr_migrated += 1
                  print(f"   ✅ Atropa: {atr_migrated} rows migrated")
              except gspread.WorksheetNotFound:
                  print("   ⚠️  Atropa tab not found — skipping")

              print(f"\n✅ Migration complete — {migrated + atr_migrated} total rows")

          # ── WRITE FARO PICKS ──────────────────────────────────
          def write_faro(sheet, ws_unified, picks, date_str):
              existing_keys = get_existing_keys(ws_unified)
              written = 0
              for p in picks:
                  game     = p.get("game", "")
                  faro_pick = p.get("faro_pick", "")
                  faro_conf = p.get("conf_pct", "")
                  key = (date_str, normalize_game(game), "ML")
                  if key in existing_keys:
                      # Update Faro columns in existing row instead
                      all_rows = ws_unified.get_all_values()
                      for i, row in enumerate(all_rows[1:], start=2):
                          if row[COL_DATE] == date_str and normalize_game(row[COL_GAME]) == normalize_game(game) and row[COL_TYPE].upper() == "ML":
                              ws_unified.update_cell(i, COL_FARO_PICK + 1, faro_pick)
                              ws_unified.update_cell(i, COL_FARO_CONF + 1, str(faro_conf))
                              print(f"   🔄 Updated Faro cols: {game}")
                              break
                      continue

                  new_row = [""] * len(HEADERS)
                  new_row[COL_DATE]      = date_str
                  new_row[COL_GAME]      = game
                  new_row[COL_TYPE]      = "ML"
                  new_row[COL_FARO_PICK] = faro_pick
                  new_row[COL_FARO_CONF] = str(faro_conf)
                  new_row[COL_FARO_WL]   = "PENDING"
                  new_row[COL_ATR_WL]    = ""
                  new_row[COL_OUR_WL]    = "PENDING"
                  ws_unified.append_row(new_row)
                  existing_keys.add(key)
                  written += 1
                  print(f"   ✅ Faro: {game} | {faro_pick} | {faro_conf}%")
              print(f"   📊 {written} new Faro rows written")

          # ── WRITE ATROPA PICKS ────────────────────────────────
          def write_atropa(sheet, ws_unified, picks, date_str):
              existing_keys = get_existing_keys(ws_unified)
              written = 0
              for p in picks:
                  matchup   = p.get("matchup", "")
                  game_full = expand_matchup(matchup)
                  pick_type = p.get("type", "ML")
                  atr_pick  = expand_abbrev(p.get("pick", ""))
                  atr_book  = p.get("book", "")
                  atr_proj  = p.get("proj", "")

                  key = (date_str, normalize_game(game_full), pick_type.upper())
                  if key in existing_keys:
                      # Update Atropa columns in existing row
                      all_rows = ws_unified.get_all_values()
                      for i, row in enumerate(all_rows[1:], start=2):
                          if row[COL_DATE] == date_str and normalize_game(row[COL_GAME]) == normalize_game(game_full) and row[COL_TYPE].upper() == pick_type.upper():
                              ws_unified.update_cell(i, COL_ATR_PICK + 1, atr_pick)
                              ws_unified.update_cell(i, COL_ATR_BOOK + 1, atr_book)
                              ws_unified.update_cell(i, COL_ATR_PROJ + 1, atr_proj)
                              print(f"   🔄 Updated Atropa cols: {game_full}")
                              break
                      continue

                  new_row = [""] * len(HEADERS)
                  new_row[COL_DATE]     = date_str
                  new_row[COL_GAME]     = game_full
                  new_row[COL_TYPE]     = pick_type
                  new_row[COL_ATR_PICK] = atr_pick
                  new_row[COL_ATR_BOOK] = atr_book
                  new_row[COL_ATR_PROJ] = atr_proj
                  new_row[COL_FARO_WL]  = ""
                  new_row[COL_ATR_WL]   = "PENDING"
                  new_row[COL_OUR_WL]   = "PENDING"
                  ws_unified.append_row(new_row)
                  existing_keys.add(key)
                  written += 1
                  print(f"   ✅ Atropa: {game_full} | {atr_pick} | {atr_proj}")
              print(f"   📊 {written} new Atropa rows written")

          # ── UPDATE W/L FROM TRACKER ───────────────────────────
          def update_wl(sheet, ws_unified, date_str=None):
              label = date_str if date_str else "ALL dates"
              print(f"\n🔄 Updating W/L for {label}...")

              ws_tracker   = sheet.worksheet(TRACKER_TAB)
              tracker_rows = ws_tracker.get_all_values()
              hdrs         = [h.strip() for h in tracker_rows[0]]

              def find_col(headers, *candidates):
                  for c in candidates:
                      for i, h in enumerate(headers):
                          if c.lower() in h.lower():
                              return i
                  return None

              date_col   = find_col(hdrs, "date")
              game_col   = find_col(hdrs, "game", "matchup")
              # Hardcoded indices based on confirmed Tracker headers:
              # A=Date, B=Game, C=Bet Type, E=Conf%, T=Actual Away, U=Actual Home
              our_pick_c  = 2   # C = Bet Type
              our_conf_c  = 4   # E = Conf%
              away_act    = 19  # T = Actual Away
              home_act    = 20  # U = Actual Home

              print(f"   📍 Using hardcoded Tracker cols — pick:C(2) conf:E(4) away_actual:T(19) home_actual:U(20)")

              tracker_lookup = {}
              for row in tracker_rows[1:]:
                  if not row:
                      continue
                  t_date = row[date_col].strip() if date_col is not None else ""
                  t_game = row[game_col].strip() if game_col is not None else ""
                  raw_pick  = row[our_pick_c].strip() if our_pick_c is not None and len(row) > our_pick_c else ""
                  # Strip ML/RL suffixes from Bet Type: "Milwaukee Brewers ML" -> "Milwaukee Brewers"
                  clean_pick = re.sub(r" (ML|RL[^a-zA-Z]*.*)$", "", raw_pick, flags=re.IGNORECASE).strip()
                  our_conf = row[our_conf_c].strip() if our_conf_c is not None and len(row) > our_conf_c else ""
                  tracker_lookup[(t_date, normalize_game(t_game))] = {
                      "away_actual": row[away_act].strip() if away_act is not None and len(row) > away_act else "",
                      "home_actual": row[home_act].strip() if home_act is not None and len(row) > home_act else "",
                      "our_pick":    clean_pick,
                      "our_conf":    our_conf,
                  }

              all_rows = ws_unified.get_all_values()
              updated = skipped = 0
              all_updates = []  # accumulate all cell updates for single batch write

              for i, row in enumerate(all_rows[1:], start=2):
                  if len(row) <= COL_OUR_WL:
                      continue
                  if date_str and row[COL_DATE] != date_str:
                      continue

                  faro_wl = row[COL_FARO_WL].strip() if len(row) > COL_FARO_WL else ""
                  atr_wl  = row[COL_ATR_WL].strip()  if len(row) > COL_ATR_WL  else ""
                  our_wl  = row[COL_OUR_WL].strip()  if len(row) > COL_OUR_WL  else ""

                  # Don't skip settled rows — still need to update Our Pick + Conf%
                  all_settled = faro_wl not in ("PENDING","") and atr_wl not in ("PENDING","") and our_wl not in ("PENDING","")
                  if all_settled:
                      skipped += 1

                  game      = row[COL_GAME].strip()
                  pick_type = row[COL_TYPE].strip()
                  row_date  = row[COL_DATE].strip()
                  t_data    = tracker_lookup.get((row_date, normalize_game(game)))

                  if not t_data:
                      print(f"   ⚠️  No tracker match: {game}")
                      continue

                  away_score = t_data["away_actual"]
                  home_score = t_data["home_actual"]

                  if away_score == "" or home_score == "":
                      print(f"   ⏳ {game} — actuals not in yet")
                      continue

                  # Resolve Faro W/L
                  faro_pick = row[COL_FARO_PICK].strip() if len(row) > COL_FARO_PICK else ""
                  if faro_pick and faro_wl in ("PENDING",""):
                      new_faro_wl = resolve_ml(faro_pick, away_score, home_score, game)
                  else:
                      new_faro_wl = faro_wl

                  # Resolve Atropa W/L
                  atr_pick = row[COL_ATR_PICK].strip() if len(row) > COL_ATR_PICK else ""
                  if atr_pick and atr_wl in ("PENDING",""):
                      new_atr_wl = resolve_ml(atr_pick, away_score, home_score, game) if pick_type == "ML" else resolve_total(atr_pick, away_score, home_score)
                  else:
                      new_atr_wl = atr_wl

                  # Always write Our Pick + Conf% regardless of W/L status
                  our_pick = t_data.get("our_pick","")
                  our_conf = t_data.get("our_conf","")

                  # Resolve Our W/L
                  if our_wl in ("PENDING",""):
                      if not our_pick:
                          new_our_wl = "NO BET"
                      elif pick_type == "ML":
                          new_our_wl = resolve_ml(our_pick, away_score, home_score, game)
                      else:
                          new_our_wl = resolve_total(our_pick, away_score, home_score)
                  else:
                      new_our_wl = our_wl

                  # Accumulate updates for single batch write at end
                  all_updates.append({"range": f"I{i}", "values": [[our_pick]]})
                  all_updates.append({"range": f"J{i}", "values": [[our_conf]]})
                  if our_wl in ("PENDING",""):
                      all_updates.append({"range": f"M{i}", "values": [[new_our_wl]]})
                  if faro_pick and faro_wl in ("PENDING",""):
                      all_updates.append({"range": f"K{i}", "values": [[new_faro_wl]]})
                  if atr_pick and atr_wl in ("PENDING",""):
                      all_updates.append({"range": f"L{i}", "values": [[new_atr_wl]]})

                  updated += 1
