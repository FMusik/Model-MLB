              filled = 0
              batch = []
              for i, row in enumerate(all_rows[1:], start=2):
                  if not row or len(row) <= COL_OUR_PICK: continue
                  game = row[COL_GAME].strip() if len(row) > COL_GAME else ""
                  date = row[COL_DATE].strip() if len(row) > COL_DATE else ""
                  t_data = tracker_lookup.get((date, normalize_game(game)))
                  if not t_data: continue
                  our_pick = t_data.get("our_pick","")
                  our_conf = t_data.get("our_conf","")
                  # Collect updates for batch write
                  batch.append({"range": f"I{i}", "values": [[our_pick]]})
                  batch.append({"range": f"J{i}", "values": [[our_conf]]})
                  filled += 1
                  print(f"   ✅ {date} {game} | Pick: {our_pick} | Conf: {our_conf}")
              if batch:
                  ws_unified.batch_update(batch)
              print(f"\n✅ Backfill done — {filled} rows updated")

          update_wl(sheet, ws_unified, date_str if not do_backfill else None)
          print_summary(ws_unified)
