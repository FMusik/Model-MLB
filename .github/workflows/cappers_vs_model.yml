name: Cappers vs Model

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date of picks (YYYY-MM-DD)"
        required: true
        default: ""
      faro_json:
        description: "Faro picks JSON (paste from Claude) — leave [] to skip"
        required: false
        default: "[]"
      atropa_json:
        description: "Atropa picks JSON (paste from Claude) — leave [] to skip"
        required: false
        default: "[]"
      migrate:
        description: "Migrate existing Faro tab into unified tab? (yes/no)"
        required: false
        default: "no"

jobs:
  cappers-vs-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Write credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run cappers logger
        env:
          RUN_DATE:    ${{ github.event.inputs.date }}
          FARO_JSON:   ${{ github.event.inputs.faro_json }}
          ATROPA_JSON: ${{ github.event.inputs.atropa_json }}
          MIGRATE:     ${{ github.event.inputs.migrate }}
        run: |
          python - <<'EOF'
          import os, json, re, datetime, gspread
          from google.oauth2.service_account import Credentials

          # ── CONFIG ─────────────────────────────────────────────
          SHEET_URL   = "https://docs.google.com/spreadsheets/d/11mgGrwt8ZTNSXlMXk3mTctUOLoU7_4Y8pfiQ2RHYVGc/edit"
          UNIFIED_TAB = "📊 Cappers vs Model"
          FARO_TAB    = "🏟️ Faro vs Model"
          TRACKER_TAB = "📊 Tracker"

          # Date Game Type | Faro Pick Faro Conf% | Atropa Pick Atropa Proj | Our Pick Our Conf% | Faro W/L Atropa W/L Our W/L
          HEADERS = [
              "Date", "Game", "Type",
              "Faro Pick", "Faro Conf%",
              "Atropa Pick", "Atropa Proj",
              "Our Pick", "Our Conf%",
              "Faro W/L", "Atropa W/L", "Our W/L",
          ]

          # Column indices (0-based)
          COL_DATE      = 0
          COL_GAME      = 1
          COL_TYPE      = 2
          COL_FARO_PICK = 3
          COL_FARO_CONF = 4
          COL_ATR_PICK  = 5
          COL_ATR_PROJ  = 6
          COL_OUR_PICK  = 7
          COL_OUR_CONF  = 8
          COL_FARO_WL   = 9
          COL_ATR_WL    = 10
          COL_OUR_WL    = 11

          # Tracker column indices (0-based, confirmed)
          TRK_DATE     = 0   # A = Date
          TRK_GAME     = 1   # B = Game
          TRK_PICK     = 2   # C = Bet Type
          TRK_CONF     = 4   # E = Conf%
          TRK_HIT_MISS = 22  # W = Hit/Miss

          # Sheet column letters (1-based A=1) for batch_update ranges
          # D=Faro Pick, E=Faro Conf%, F=Atropa Pick, G=Atropa Proj
          # H=Our Pick, I=Our Conf%, J=Faro W/L, K=Atropa W/L, L=Our W/L

          # ── TEAM NAME MAPS ─────────────────────────────────────
          ABBREV_TO_FULL = {
              "ARI": "Arizona Diamondbacks",  "ATL": "Atlanta Braves",
              "BAL": "Baltimore Orioles",     "BOS": "Boston Red Sox",
              "CHC": "Chicago Cubs",          "CWS": "Chicago White Sox",
              "CIN": "Cincinnati Reds",       "CLE": "Cleveland Guardians",
              "COL": "Colorado Rockies",      "DET": "Detroit Tigers",
              "HOU": "Houston Astros",        "KC":  "Kansas City Royals",
              "KCR": "Kansas City Royals",    "LAA": "Los Angeles Angels",
              "LAD": "Los Angeles Dodgers",   "MIA": "Miami Marlins",
              "MIL": "Milwaukee Brewers",     "MIN": "Minnesota Twins",
              "NYM": "New York Mets",         "NYY": "New York Yankees",
              "OAK": "Athletics",             "ATH": "Athletics",
              "PHI": "Philadelphia Phillies", "PIT": "Pittsburgh Pirates",
              "SD":  "San Diego Padres",      "SDP": "San Diego Padres",
              "SEA": "Seattle Mariners",      "SF":  "San Francisco Giants",
              "SFG": "San Francisco Giants",  "STL": "St. Louis Cardinals",
              "TB":  "Tampa Bay Rays",        "TBR": "Tampa Bay Rays",
              "TEX": "Texas Rangers",         "TOR": "Toronto Blue Jays",
              "WSN": "Washington Nationals",  "WSH": "Washington Nationals",
          }

          FULL_TO_ABBREV = {v.upper(): k for k, v in ABBREV_TO_FULL.items()}
          FULL_TO_ABBREV["ATHLETICS"]             = "OAK"
          FULL_TO_ABBREV["OAKLAND ATHLETICS"]     = "OAK"
          FULL_TO_ABBREV["SAN DIEGO PADRES"]      = "SDP"
          FULL_TO_ABBREV["WASHINGTON NATIONALS"]  = "WSN"
          FULL_TO_ABBREV["KANSAS CITY ROYALS"]    = "KCR"
          FULL_TO_ABBREV["TAMPA BAY RAYS"]        = "TBR"
          FULL_TO_ABBREV["SAN FRANCISCO GIANTS"]  = "SFG"
          FULL_TO_ABBREV["CHICAGO WHITE SOX"]     = "CWS"
          FULL_TO_ABBREV["CHICAGO CUBS"]          = "CHC"
          FULL_TO_ABBREV["NEW YORK YANKEES"]      = "NYY"
          FULL_TO_ABBREV["NEW YORK METS"]         = "NYM"
          FULL_TO_ABBREV["LOS ANGELES DODGERS"]   = "LAD"
          FULL_TO_ABBREV["LOS ANGELES ANGELS"]    = "LAA"
          FULL_TO_ABBREV["BOSTON RED SOX"]        = "BOS"
          FULL_TO_ABBREV["TORONTO BLUE JAYS"]     = "TOR"
          FULL_TO_ABBREV["MINNESOTA TWINS"]       = "MIN"
          FULL_TO_ABBREV["CLEVELAND GUARDIANS"]   = "CLE"
          FULL_TO_ABBREV["DETROIT TIGERS"]        = "DET"
          FULL_TO_ABBREV["HOUSTON ASTROS"]        = "HOU"
          FULL_TO_ABBREV["SEATTLE MARINERS"]      = "SEA"
          FULL_TO_ABBREV["TEXAS RANGERS"]         = "TEX"
          FULL_TO_ABBREV["BALTIMORE ORIOLES"]     = "BAL"
          FULL_TO_ABBREV["MIAMI MARLINS"]         = "MIA"
          FULL_TO_ABBREV["PHILADELPHIA PHILLIES"] = "PHI"
          FULL_TO_ABBREV["ATLANTA BRAVES"]        = "ATL"
          FULL_TO_ABBREV["PITTSBURGH PIRATES"]    = "PIT"
          FULL_TO_ABBREV["ST. LOUIS CARDINALS"]   = "STL"
          FULL_TO_ABBREV["MILWAUKEE BREWERS"]     = "MIL"
          FULL_TO_ABBREV["CINCINNATI REDS"]       = "CIN"
          FULL_TO_ABBREV["COLORADO ROCKIES"]      = "COL"
          FULL_TO_ABBREV["ARIZONA DIAMONDBACKS"]  = "ARI"

          def expand_abbrev(abbrev):
              clean = abbrev.upper().replace(" ML", "").strip()
              return ABBREV_TO_FULL.get(clean, abbrev)

          def expand_matchup(matchup):
              parts = re.split(r"[@]", matchup.upper())
              if len(parts) == 2:
                  away = ABBREV_TO_FULL.get(parts[0].strip(), parts[0].strip())
                  home = ABBREV_TO_FULL.get(parts[1].strip(), parts[1].strip())
                  return f"{away} @ {home}"
              return matchup

          def normalize_game(game_str):
              """Normalize to ABBREV@ABBREV for reliable dedup matching."""
              normalized = game_str.upper().replace(" @ ", "@").replace(" VS ", "@").strip()
              parts = normalized.split("@")
              if len(parts) == 2:
                  away = FULL_TO_ABBREV.get(parts[0].strip(), parts[0].strip())
                  home = FULL_TO_ABBREV.get(parts[1].strip(), parts[1].strip())
                  return f"{away}@{home}"
              return normalized

          # ── SHEETS AUTH ────────────────────────────────────────
          def get_sheet():
              scopes = [
                  "https://spreadsheets.google.com/feeds",
                  "https://www.googleapis.com/auth/drive",
              ]
              creds = Credentials.from_service_account_file("credentials.json", scopes=scopes)
              gc    = gspread.authorize(creds)
              return gc.open_by_url(SHEET_URL)

          def get_or_create_tab(sheet):
              try:
                  ws = sheet.worksheet(UNIFIED_TAB)
                  print(f"📋 Found tab: {UNIFIED_TAB}")
                  if ws.col_count < 20:
                      ws.add_cols(20 - ws.col_count)
              except gspread.WorksheetNotFound:
                  ws = sheet.add_worksheet(title=UNIFIED_TAB, rows=1000, cols=20)
                  ws.append_row(HEADERS)
                  print(f"✅ Created tab: {UNIFIED_TAB}")
              return ws

          def get_existing_keys(ws):
              rows = ws.get_all_values()
              keys = set()
              for row in rows[1:]:
                  if len(row) >= 3:
                      keys.add((row[COL_DATE], normalize_game(row[COL_GAME]), row[COL_TYPE].upper()))
              return keys

          # ── MIGRATE FARO TAB ───────────────────────────────────
          def migrate(sheet, ws_unified):
              print("\n🔄 Migrating Faro data...")
              existing_keys = get_existing_keys(ws_unified)
              migrated = 0
              try:
                  ws_faro   = sheet.worksheet(FARO_TAB)
                  faro_rows = ws_faro.get_all_values()[1:]
                  for row in faro_rows:
                      if len(row) < 4:
                          continue
                      date_str  = row[0].strip()
                      game      = row[1].strip()
                      faro_pick = row[2].strip()
                      faro_conf = row[3].strip()
                      faro_wl   = row[7].strip() if len(row) > 7 else "PENDING"
                      our_wl    = row[8].strip() if len(row) > 8 else "PENDING"
                      key = (date_str, normalize_game(game), "ML")
                      if key in existing_keys:
                          continue
                      new_row = [""] * len(HEADERS)
                      new_row[COL_DATE]      = date_str
                      new_row[COL_GAME]      = game
                      new_row[COL_TYPE]      = "ML"
                      new_row[COL_FARO_PICK] = faro_pick
                      new_row[COL_FARO_CONF] = faro_conf
                      new_row[COL_FARO_WL]   = faro_wl
                      new_row[COL_OUR_WL]    = our_wl
                      ws_unified.append_row(new_row)
                      existing_keys.add(key)
                      migrated += 1
                  print(f"   ✅ {migrated} Faro rows migrated")
              except gspread.WorksheetNotFound:
                  print("   ⚠️  Faro tab not found — skipping")

          # ── WRITE FARO PICKS ───────────────────────────────────
          def faro_to_away_home(game_str):
              """Faro gives 'Home vs Away' — flip to 'Away @ Home' to match Atropa."""
              if " vs " in game_str.lower():
                  parts = re.split(r" vs ", game_str, flags=re.IGNORECASE)
                  if len(parts) == 2:
                      return f"{parts[1].strip()} @ {parts[0].strip()}"
              return game_str

          def write_faro(sheet, ws_unified, picks, date_str):
              existing_keys = get_existing_keys(ws_unified)
              all_rows = ws_unified.get_all_values()
              written  = 0
              updates  = []
              for p in picks:
                  game      = faro_to_away_home(p.get("game", ""))
                  faro_pick = p.get("faro_pick", "")
                  faro_conf = str(p.get("conf_pct", ""))
                  key = (date_str, normalize_game(game), "ML")
                  if key in existing_keys:
                      for i, row in enumerate(all_rows[1:], start=2):
                          if row[COL_DATE] == date_str and normalize_game(row[COL_GAME]) == normalize_game(game) and row[COL_TYPE].upper() == "ML":
                              updates.append({"range": f"D{i}", "values": [[faro_pick]]})
                              updates.append({"range": f"E{i}", "values": [[faro_conf]]})
                              print(f"   🔄 Updated Faro: {game}")
                              break
                      continue
                  new_row = [""] * len(HEADERS)
                  new_row[COL_DATE]      = date_str
                  new_row[COL_GAME]      = game
                  new_row[COL_TYPE]      = "ML"
                  new_row[COL_FARO_PICK] = faro_pick
                  new_row[COL_FARO_CONF] = faro_conf
                  new_row[COL_FARO_WL]   = "PENDING"
                  new_row[COL_OUR_WL]    = "PENDING"
                  ws_unified.append_row(new_row)
                  existing_keys.add(key)
                  written += 1
                  print(f"   ✅ Faro: {game} | {faro_pick} | {faro_conf}%")
              if updates:
                  ws_unified.batch_update(updates)
              print(f"   📊 {written} new Faro rows written")

          # ── WRITE ATROPA PICKS ─────────────────────────────────
          def write_atropa(sheet, ws_unified, picks, date_str):
              existing_keys = get_existing_keys(ws_unified)
              all_rows = ws_unified.get_all_values()
              written  = 0
              updates  = []
              for p in picks:
                  matchup   = p.get("matchup", "")
                  game_full = expand_matchup(matchup)
                  pick_type = p.get("type", "ML")
                  atr_pick  = expand_abbrev(p.get("pick", ""))
                  atr_proj  = p.get("proj", "")
                  key = (date_str, normalize_game(game_full), pick_type.upper())
                  if key in existing_keys:
                      for i, row in enumerate(all_rows[1:], start=2):
                          if row[COL_DATE] == date_str and normalize_game(row[COL_GAME]) == normalize_game(game_full) and row[COL_TYPE].upper() == pick_type.upper():
                              updates.append({"range": f"F{i}", "values": [[atr_pick]]})
                              updates.append({"range": f"G{i}", "values": [[atr_proj]]})
                              print(f"   🔄 Updated Atropa: {game_full}")
                              break
                      continue
                  new_row = [""] * len(HEADERS)
                  new_row[COL_DATE]     = date_str
                  new_row[COL_GAME]     = game_full
                  new_row[COL_TYPE]     = pick_type
                  new_row[COL_ATR_PICK] = atr_pick
                  new_row[COL_ATR_PROJ] = atr_proj
                  new_row[COL_ATR_WL]   = "PENDING"
                  new_row[COL_OUR_WL]   = "PENDING"
                  ws_unified.append_row(new_row)
                  existing_keys.add(key)
                  written += 1
                  print(f"   ✅ Atropa: {game_full} | {atr_pick} | {atr_proj}")
              if updates:
                  ws_unified.batch_update(updates)
              print(f"   📊 {written} new Atropa rows written")

          # ── UPDATE Our Pick + Our Conf% + Our W/L FROM TRACKER ─
          def update_from_tracker(sheet, ws_unified, date_str):
              print(f"\n🔄 Pulling Our Pick / Conf% / W/L from Tracker for {date_str}...")

              ws_tracker   = sheet.worksheet(TRACKER_TAB)
              tracker_rows = ws_tracker.get_all_values()

              print(f"   📋 Tracker headers: {tracker_rows[0][:6] if tracker_rows else 'EMPTY'}")
              print(f"   📋 Tracker total rows: {len(tracker_rows)-1}")

              def bet_type_to_pick_type(bet_type):
                  b = bet_type.upper().strip()
                  if b.startswith("OVER") or b.startswith("UNDER"):
                      return "TOTAL"
                  if "ML" in b:
                      return "ML"
                  return None

              tracker_lookup = {}
              for row in tracker_rows[1:]:
                  if not row:
                      continue
                  t_date   = row[TRK_DATE].strip()     if len(row) > TRK_DATE     else ""
                  t_game   = row[TRK_GAME].strip()     if len(row) > TRK_GAME     else ""
                  raw_pick = row[TRK_PICK].strip()     if len(row) > TRK_PICK     else ""
                  our_conf = row[TRK_CONF].strip()     if len(row) > TRK_CONF     else ""
                  hit_miss = row[TRK_HIT_MISS].strip() if len(row) > TRK_HIT_MISS else ""
                  pick_type = bet_type_to_pick_type(raw_pick)
                  if not pick_type:
                      continue
                  if pick_type == "ML":
                      clean_pick = raw_pick.rsplit(" ML", 1)[0].strip() if raw_pick.upper().endswith(" ML") else raw_pick.strip()
                  else:
                      clean_pick = raw_pick
                  key = (t_date, normalize_game(t_game), pick_type)
                  tracker_lookup[key] = {
                      "our_pick": clean_pick,
                      "our_conf": our_conf,
                      "our_wl":   hit_miss,
                  }

              print(f"   📦 Tracker lookup entries for {date_str}:")
              for k, v in tracker_lookup.items():
                  if k[0] == date_str:
                      print(f"      {k} → conf:{v['our_conf']} wl:{v['our_wl']}")

              all_rows = ws_unified.get_all_values()
              updates  = []
              updated  = 0

              for i, row in enumerate(all_rows[1:], start=2):
                  if len(row) <= COL_OUR_WL:
                      continue
                  row_date  = row[COL_DATE].strip()
                  game      = row[COL_GAME].strip()
                  pick_type = "TOTAL" if row[COL_TYPE].strip().upper() == "TOTAL" else "ML"
                  lookup_key = (row_date, normalize_game(game), pick_type)
                  print(f"   🔍 Looking up: {lookup_key}")
                  t_data    = tracker_lookup.get(lookup_key)
                  if not t_data:
                      print(f"   ⚠️  No tracker match: {game} ({pick_type})")
                      continue
                  updates.append({"range": f"H{i}", "values": [[t_data["our_pick"]]]})
                  updates.append({"range": f"I{i}", "values": [[t_data["our_conf"]]]})
                  updates.append({"range": f"L{i}", "values": [[t_data["our_wl"]]]})
                  updated += 1
                  print(f"   ✅ {game} ({pick_type}) | Pick: {t_data['our_pick']} | Conf: {t_data['our_conf']} | W/L: {t_data['our_wl']}")

              if updates:
                  ws_unified.batch_update(updates)
              print(f"\n📊 {updated} rows updated from Tracker")


          # ── WRITE SUMMARY TO SHEET ─────────────────────────────
          def write_summary(ws_unified):
              rows = ws_unified.get_all_values()[1:]

              def record(col_idx):
                  settled = [r for r in rows if len(r) > col_idx and r[col_idx] not in ("PENDING","","NO BET")]
                  wins    = sum(1 for r in settled if r[col_idx] in ("WIN","W"))
                  losses  = sum(1 for r in settled if r[col_idx] in ("LOSS","L"))
                  total   = wins + losses
                  pct     = f"{wins/total*100:.1f}%" if total > 0 else "N/A"
                  return wins, losses, pct

              all_agree = [r for r in rows
                           if len(r) > COL_OUR_WL
                           and r[COL_FARO_PICK] and r[COL_ATR_PICK]
                           and r[COL_FARO_WL] not in ("","PENDING")
                           and r[COL_ATR_WL]  not in ("","PENDING")
                           and r[COL_OUR_WL]  not in ("","PENDING","NO BET")]

              f_w, f_l, f_pct = record(COL_FARO_WL)
              a_w, a_l, a_pct = record(COL_ATR_WL)
              o_w, o_l, o_pct = record(COL_OUR_WL)
              agree_wins  = sum(1 for r in all_agree if r[COL_OUR_WL] in ("WIN","W"))
              agree_total = len(all_agree)
              agree_pct   = f"{agree_wins/agree_total*100:.1f}%" if agree_total > 0 else "N/A"

              print(f"\n📈 CAPPERS vs MODEL SUMMARY")
              print(f"  Faro:           {f_w}W-{f_l}L  {f_pct}")
              print(f"  Atropa:         {a_w}W-{a_l}L  {a_pct}")
              print(f"  Our Model:      {o_w}W-{o_l}L  {o_pct}")
              print(f"  Both Agree:     {agree_wins}W-{agree_total-agree_wins}L  {agree_pct}")

              last_updated = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
              summary_block = [
                  ["📊 CAPPERS vs MODEL SUMMARY", "",           "",                      ""],
                  [f"Updated: {last_updated}",    "",           "",                      ""],
                  [""],
                  ["Model",             "W",        "L",                     "Win%"],
                  ["Faro",              f_w,        f_l,                     f_pct],
                  ["Atropa",            a_w,        a_l,                     a_pct],
                  ["Our Model",         o_w,        o_l,                     o_pct],
                  ["Both Agree",        agree_wins, agree_total-agree_wins,   agree_pct],
              ]
              ws_unified.update("N1:Q8", summary_block, value_input_option="USER_ENTERED")
              print(f"   ✅ Summary written to cols N-Q")

          # ── MAIN ───────────────────────────────────────────────
          date_str   = os.environ.get("RUN_DATE","").strip() or datetime.date.today().isoformat()
          faro_raw   = os.environ.get("FARO_JSON","[]").strip()
          atropa_raw = os.environ.get("ATROPA_JSON","[]").strip()
          do_migrate = os.environ.get("MIGRATE","no").strip().lower() == "yes"

          print(f"📅 Date: {date_str}")
          print(f"Raw Faro preview:   {faro_raw[:80]}")
          print(f"Raw Atropa preview: {atropa_raw[:80]}")

          sheet      = get_sheet()
          ws_unified = get_or_create_tab(sheet)

          if do_migrate:
              migrate(sheet, ws_unified)

          try:
              faro_picks = json.loads(faro_raw)
              if isinstance(faro_picks, list) and len(faro_picks) == 1 and isinstance(faro_picks[0], list):
                  faro_picks = faro_picks[0]
          except json.JSONDecodeError as e:
              print(f"❌ Faro JSON error: {e}")
              faro_picks = []

          try:
              atropa_picks = json.loads(atropa_raw)
              if isinstance(atropa_picks, list) and len(atropa_picks) == 1 and isinstance(atropa_picks[0], list):
                  atropa_picks = atropa_picks[0]
          except json.JSONDecodeError as e:
              print(f"❌ Atropa JSON error: {e}")
              atropa_picks = []

          if faro_picks:
              print(f"\n⚾ Writing {len(faro_picks)} Faro picks...")
              write_faro(sheet, ws_unified, faro_picks, date_str)

          if atropa_picks:
              print(f"\n⚾ Writing {len(atropa_picks)} Atropa picks...")
              write_atropa(sheet, ws_unified, atropa_picks, date_str)

          update_from_tracker(sheet, ws_unified, date_str)
          write_summary(ws_unified)
          EOF

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
