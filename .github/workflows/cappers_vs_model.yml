                           and r[COL_FARO_PICK] and r[COL_ATR_PICK]
                           and r[COL_FARO_WL] not in ("","PENDING")
                           and r[COL_ATR_WL]  not in ("","PENDING")
                           and r[COL_OUR_WL]  not in ("","PENDING","NO BET")]

              f_w, f_l, f_pct = record(COL_FARO_WL)
              a_w, a_l, a_pct = record(COL_ATR_WL)
              o_w, o_l, o_pct = record(COL_OUR_WL)

              agree_wins  = sum(1 for r in all_agree if r[COL_OUR_WL] == "WIN")
              agree_total = len(all_agree)
              agree_pct   = f"{agree_wins/agree_total*100:.1f}%" if agree_total > 0 else "N/A"

