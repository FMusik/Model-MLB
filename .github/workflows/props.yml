name: MLB Props

on:
  schedule:
    - cron: '30 15 * * *'   # 11:30 AM ET (EDT) / 10:30 AM ET (EST)
    - cron: '0 22 * * *'    # 6:00 PM ET (EDT)  /  5:00 PM ET (EST)
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Backfill last N days of Props Tracker results (0 = run normally)'
        required: false
        default: '0'

jobs:
  run-props:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests pandas numpy scipy openpyxl pybaseball beautifulsoup4

      - name: Write credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Fetch BallparkPal data
        if: ${{ (github.event.inputs.backfill_days || '0') == '0' }}
        run: python fetch_ballparkpal.py
        env:
          BP_EMAIL:    ${{ secrets.BP_EMAIL }}
          BP_PASSWORD: ${{ secrets.BP_PASSWORD }}

      - name: Run MLB props model
        if: ${{ (github.event.inputs.backfill_days || '0') == '0' }}
        run: python mlb_props.py
        env:
          ODDS_API_KEY:   ${{ secrets.ODDS_API_KEY }}
          PROPS_SHEET_ID: ${{ secrets.PROPS_SHEET_ID }}

      - name: Auto-score Props Tracker
        if: always()
        run: |
          BACKFILL="${{ github.event.inputs.backfill_days || '0' }}"
          if [ "$BACKFILL" -gt 0 ]; then
            echo "Running scorer in backfill mode for $BACKFILL day(s)"
            python sheets/props_scorer.py --backfill "$BACKFILL"
          else
            python sheets/props_scorer.py
          fi
        env:
          PROPS_SHEET_ID: ${{ secrets.PROPS_SHEET_ID }}

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
